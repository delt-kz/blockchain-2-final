specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GovernanceToken
    network: base-sepolia
    source:
      address: "0x11Cb8e82cc243Abbb960373E701a10593234A8dA"
      abi: GovernanceToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - TokenTransfer
        - DelegateChange
      abis:
        - name: GovernanceToken
          file: ./abis/GovernanceToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTokenTransfer
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
      file: ./src/mapping.ts
  - kind: ethereum
    name: ProtocolGovernor
    network: base-sepolia
    source:
      address: "0x131B28c5141eff6860312643C44BFEE911AF4A7C"
      abi: ProtocolGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Proposal
        - VoteCast
      abis:
        - name: ProtocolGovernor
          file: ./abis/ProtocolGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: ./src/mapping.ts
  - kind: ethereum
    name: DefiSwapPair
    network: base-sepolia
    source:
      address: "0x45B59F4866A5748721c82db2Cc5149CFc5178dDB"
      abi: DefiSwapPair
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityPosition
      abis:
        - name: DefiSwapPair
          file: ./abis/DefiSwapPair.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,indexed address,uint256,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
      file: ./src/mapping.ts
  - kind: ethereum
    name: YieldVault
    network: base-sepolia
    source:
      address: "0xDBCFA9EC3607e94298070202bF29aCeC5799b6af"
      abi: YieldVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - VaultWithdraw
      abis:
        - name: YieldVault
          file: ./abis/YieldVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleVaultWithdraw
      file: ./src/mapping.ts
  - kind: ethereum
    name: ProtocolItems
    network: base-sepolia
    source:
      address: "0xEDB4203e218795531AC31D1A2bdEc83f8A38A41A"
      abi: ProtocolItems
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - ItemTransfer
      abis:
        - name: ProtocolItems
          file: ./abis/ProtocolItems.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleItemTransferSingle
      file: ./src/mapping.ts
