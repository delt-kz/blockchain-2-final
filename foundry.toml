[profile.default]
src = "contracts"
test = "test/foundry"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./deployments" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[profile.ci.fuzz]
runs = 256

[profile.ci.invariant]
runs = 64
depth = 32
