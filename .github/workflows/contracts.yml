name: Contracts

on:
  push:
  pull_request:

jobs:
  hardhat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage
