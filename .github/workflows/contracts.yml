name: Contracts

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: python -m pip install --user slither-analyzer

      - name: Compile
        run: npm run compile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Solidity lint
        run: npm run lint:sol

      - name: Frontend prettier
        run: npm run lint:frontend

      - name: Hardhat tests
        run: npm test

      - name: Frontend build
        run: npm run build:frontend

      - name: Subgraph build
        run: npm run build:subgraph

      - name: Forge build
        run: npm run forge:build

      - name: Forge tests
        run: npm run forge:test

      - name: Forge coverage
        run: npm run forge:coverage

      - name: Slither
        run: npm run slither
